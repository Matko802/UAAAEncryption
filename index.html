<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encrypted Terminal</title>
    <style>
        body { margin: 0; padding: 0; background: #0a0a0a; color: #7e5af0; font-family: 'Courier New', monospace; user-select: none; }
        #_A { display: block; max-width: 600px; margin: 40px auto; padding: 20px; }
        textarea { width: 100%; min-height: 120px; height: auto; background: #000; color: #7e5af0; border: 1px solid #333; padding: 10px; font-family: inherit; box-sizing: border-box; margin-bottom: 10px; outline: 0; word-break: break-all; overflow-y: hidden; resize: none; }
        textarea:focus { border-color: #7e5af0; }
        .b { display: flex; gap: 10px; margin-bottom: 20px; }
        button { flex: 1; padding: 15px; background: #000; color: #7e5af0; border: 1px solid #7e5af0; cursor: pointer; font-family: inherit; text-transform: uppercase; font-weight: bold; letter-spacing: 2px; transition: 0.2s; }
        button:hover { background: #7e5af0; color: #000; }
        #_S { color: #ff3333; margin-bottom: 10px; text-align: center; min-height: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="_A">
        <div class="b">
            <button id="_btnM" onclick="_T()">MODE: ENCRYPT</button>
        </div>
        <div id="_S"></div>
        <textarea id="_2" placeholder="Type or paste payload here..." autocomplete="off"></textarea>
        <textarea id="_3" readonly placeholder="Live output will appear here..." autocomplete="off"></textarea>
    </div>

    <!-- Shared cipher engine (single source of truth, also @require'd by the Tampermonkey userscript) -->
    <script src="uaaa-core.js"></script>

    <script>
        /* Anti-snoop protections */
        document.oncontextmenu = e => { e.preventDefault(); return !1; };
        document.onkeydown = e => { if (e.keyCode === 123 || (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74)) || (e.ctrlKey && e.keyCode === 85)) { e.preventDefault(); return !1; } };

        /* Default key used by the on-page UI and the public API */
        const _p = '\x55\x41\x41\x41';
        let _m = !0;

        window.addEventListener('load', () => {
            document.getElementById('_2').value = '';
            document.getElementById('_3').value = '';

            // Check URL API Engine (used by the "Site" link injected by the userscript,
            // and by TerminalAPI.generateLink())
            const u = new URLSearchParams(window.location.search);
            const d = u.get('d'), m = u.get('m'), k = u.get('k') || _p;

            if (d && k === _p) {
                _m = !(m === 'dec');
                document.getElementById('_btnM').innerText = _m ? 'MODE: ENCRYPT' : 'MODE: DECRYPT';
                document.getElementById('_2').value = decodeURIComponent(d);
                _H(document.getElementById('_2'));
                _P();
            } else {
                _H(document.getElementById('_2'));
                _H(document.getElementById('_3'));
            }
        });

        function _H(el) {
            el.style.height = 'auto';
            el.style.height = el.scrollHeight + 'px';
        }

        function _T() {
            _m = !_m;
            document.getElementById('_btnM').innerText = _m ? 'MODE: ENCRYPT' : 'MODE: DECRYPT';
            _P();
        }

        document.getElementById('_2').addEventListener('input', function() {
            _H(this);
            _P();
        });

        function _P() {
            let i = document.getElementById('_2').value, o = document.getElementById('_3'), s = document.getElementById('_S');
            s.innerText = ''; o.value = '';
            if (!i.trim()) {
                _H(o);
                return;
            }
            try {
                o.value = _C(i, _p, _m);
            } catch (x) {
                if (!_m && i.trim().length > 3) {
                    s.innerText = 'INVALID CIPHER SIGNATURE';
                }
            }
            _H(o);
        }

        /*
           =========================================================
           PUBLIC API SPECIFICATION FOR INTEGRATIONS & MESSAGING APPS
           =========================================================
        */
        window.TerminalAPI = {
            encrypt: function(text, customKey = _p) {
                try { return _C(text, customKey, true); } catch(e) { return null; }
            },
            decrypt: function(cipher, customKey = _p) {
                try { return _C(cipher, customKey, false); } catch(e) { return null; }
            },
            generateLink: function(mode, text) {
                const base = window.location.href.split('?')[0];
                return `${base}?m=${mode === 'decrypt' ? 'dec' : 'enc'}&d=${encodeURIComponent(text)}`;
            }
        };
    </script>
</body>
</html>
