<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="https://github.com/Matko802/UAAAEncryption/blob/main/Assets/logo/UA.png?raw=true" type="image/png">
    <title>UAAA Encryptor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; background: #000000; color: #cc3d4d; font-family: 'JetBrains Mono', monospace; user-select: none; }
        #_A { display: block; max-width: 600px; margin: 40px auto; padding: 20px; }
        textarea { width: 100%; min-height: 120px; height: auto; background: #000; color: #fff; border: 1px solid #333; padding: 10px; font-family: inherit; box-sizing: border-box; margin-bottom: 10px; outline: 0; word-break: break-all; overflow-y: hidden; resize: none; }
        textarea:focus { border-color: #cc3d4d; }
        button { flex: 1; min-width: 150px; padding: 15px; background: #000; color: #cc3d4d; border: 1px solid #cc3d4d; cursor: pointer; font-family: inherit; text-transform: uppercase; font-weight: bold; letter-spacing: 2px; transition: 0.2s; }
        button:hover { background: #cc3d4d; color: #000; }
        button:active { transform: scale(0.98); }
        #_S { color: #ff3333; margin-bottom: 10px; text-align: center; min-height: 20px; font-weight: bold; font-size: 0.9em; word-break: break-word; }
        .slider-container { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
        .toggle-slider { flex: 1; position: relative; height: 50px; background: #000; border: 1px solid #cc3d4d; border-radius: 0; cursor: pointer; overflow: hidden; }
        .toggle-slider-labels { display: flex; width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 2; }
        .toggle-slider-label { flex: 1; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: bold; font-size: 0.9em; letter-spacing: 2px; text-transform: uppercase; pointer-events: none; }
        .toggle-slider-thumb { position: absolute; top: 0; left: 0; width: 50%; height: 100%; background: #cc3d4d; border-radius: 0; transition: 0.3s; cursor: pointer; z-index: 1; }
        .toggle-slider.active .toggle-slider-thumb { left: 50%; }
        .slider-label { color: #cc3d4d; font-family: 'Courier New', monospace; font-weight: bold; letter-spacing: 2px; text-transform: uppercase; font-size: 0.85em; display: none; }
        .site-header { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 18px; }
        .site-header img { height: 48px; width: auto; display: block; }
        .site-header .site-title { color: #cc3d4d; font-size: 1.4em; font-weight: 700; letter-spacing: 2px; }
        .textarea-wrapper { position: relative; display: flex; align-items: stretch; gap: 0; border: 1px solid #333; background: #000; margin-bottom: 10px; }
        .textarea-wrapper:focus-within { border-color: #cc3d4d; }
        .textarea-wrapper textarea { border: none; margin: 0; padding: 10px; width: 100%; min-height: 120px; resize: none; box-sizing: border-box; }
        .textarea-actions {
            display: flex;
            flex-direction: column;
            gap: 4px;
            padding: 10px;
        }
        .textarea-actions button {
            padding: 4px 8px;
                min-width: 50px;
                font-size: 0.75em;
            background: rgba(0, 0, 0, 0.5);
            border: none;
            color: #fff;
            letter-spacing: 0;
            text-transform: none;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            user-select: none;
        }
        .textarea-actions button:hover {
            color: #000;
            background: #cc3d4d;
        }
        .textarea-actions button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        /* Version badge */
        #version-badge {
            position: fixed;
            right: 8px;
            bottom: 6px;
            font-size: 0.78em;
            color: #666;
            background: transparent;
            pointer-events: none;
            font-family: 'JetBrains Mono', monospace;
            user-select: none;
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <div id="_A">
        <div class="site-header">
            <img src="Assets/logo/UA.png" alt="UAAA logo">
            <div class="site-title">UAAA Encryptor</div>
        </div>
        <div class="slider-container">
            <div class="toggle-slider" id="_slider" onclick="_T()">
                <div class="toggle-slider-labels">
                    <div class="toggle-slider-label">ENCRYPT</div>
                    <div class="toggle-slider-label">DECRYPT</div>
                </div>
                <div class="toggle-slider-thumb"></div>
            </div>
        </div>
        <div id="_S"></div>
        <div class="textarea-wrapper">
            <textarea id="_2" placeholder="Type or paste payload here..." autocomplete="off"></textarea>
            <div class="textarea-actions">
                <button id="_btnPasteInput" onclick="_pasteText('_2', this)">Paste</button>
                <button id="_btnCopyInput" onclick="_copyText('_2', this)">Copy</button>
            </div>
        </div>
        <div id="_textarea-wrapper" class="textarea-wrapper">
            <textarea id="_3" readonly placeholder="Live output will appear here..." autocomplete="off"></textarea>
            <div class="textarea-actions">
                <button id="_btnCopy" onclick="_copyText('_3', this)" style="display: none;">Copy</button>
            </div>
        </div>
    </div>

    <!-- Shared cipher engine (single source of truth, also @require'd by the Tampermonkey userscript) -->
    <script src="uaaa-core.js"></script>

    <script>
        /* Anti-snoop protections */
        document.oncontextmenu = e => { e.preventDefault(); return !1; };
        document.onkeydown = e => { if (e.keyCode === 123 || (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74)) || (e.ctrlKey && e.keyCode === 85)) { e.preventDefault(); return !1; } };

        /* Default key used by the on-page UI and the public API */
        const _p = '\x55\x41\x41\x41';
        let _m = !0;
        let ignoreClickUntil = 0;

        window.addEventListener('load', () => {
            document.getElementById('_2').value = '';
            document.getElementById('_3').value = '';

            // Check URL API Engine (used by the "Site" link injected by the userscript,
            // and by TerminalAPI.generateLink())
            const u = new URLSearchParams(window.location.search);
            const d = u.get('d'), m = u.get('m'), k = u.get('k') || _p;

            if (d && k === _p) {
                _m = !(m === 'dec');
                const slider = document.getElementById('_slider');
                if (_m) {
                    slider.classList.remove('active');
                } else {
                    slider.classList.add('active');
                }
                document.getElementById('_2').value = decodeURIComponent(d);
                _H(document.getElementById('_2'));
                _P();
            } else {
                _H(document.getElementById('_2'));
                _H(document.getElementById('_3'));
            }
        });

        function _H(el) {
            el.style.height = 'auto';
            el.style.height = el.scrollHeight + 'px';
        }

        function _T() {
            if (Date.now() < ignoreClickUntil) { ignoreClickUntil = 0; return; }
            _m = !_m;
            const slider = document.getElementById('_slider');
            if (_m) {
                slider.classList.remove('active');
            } else {
                slider.classList.add('active');
            }
            _P();
        }

        // Dragging disabled: slider uses click/tap only to toggle state.

        function _fallbackCopy(text) {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.setAttribute('readonly', '');
            textarea.style.position = 'fixed';
            textarea.style.left = '-9999px';
            document.body.appendChild(textarea);
            textarea.select();
            try { document.execCommand('copy'); } catch (e) { console.warn('Fallback copy failed', e); }
            document.body.removeChild(textarea);
        }

        function _fallbackPaste() {
            const textarea = document.createElement('textarea');
            textarea.value = '';
            textarea.setAttribute('readonly', '');
            textarea.style.position = 'fixed';
            textarea.style.left = '-9999px';
            document.body.appendChild(textarea);
            textarea.focus();
            document.execCommand('paste');
            document.body.removeChild(textarea);
        }

        function _copyText(targetId, btn) {
            const value = document.getElementById(targetId).value;
            if (!value.trim()) return;
            const copyPromise = navigator.clipboard && navigator.clipboard.writeText
                ? navigator.clipboard.writeText(value)
                : Promise.resolve().then(() => { _fallbackCopy(value); });
            copyPromise.then(() => {
                const originalText = btn.innerText;
                btn.innerText = 'Copied!';
                btn.style.color = '#2ed573';
                btn.style.background = 'rgba(0, 0, 0, 0.5)';
                setTimeout(() => { 
                    btn.innerText = originalText; 
                    btn.style.color = '#fff';
                    btn.style.background = 'rgba(0, 0, 0, 0.5)';
                }, 2000);
            }).catch(err => {
                console.error('Copy failed:', err);
                document.getElementById('_S').innerText = 'COPY FAILED';
            });
        }

        function _pasteText(targetId, btn) {
            const pastePromise = navigator.clipboard && navigator.clipboard.readText
                ? navigator.clipboard.readText()
                : Promise.resolve().then(() => {
                    _fallbackPaste();
                    return '';
                });
            pastePromise.then(text => {
                const input = document.getElementById(targetId);
                input.value = text;
                input.dispatchEvent(new Event('input', { bubbles: true }));
                const originalText = btn.innerText;
                btn.innerText = 'Pasted!';
                btn.style.color = '#2ed573';
                btn.style.background = 'rgba(0, 0, 0, 0.5)';
                setTimeout(() => { 
                    btn.innerText = originalText; 
                    btn.style.color = '#fff';
                    btn.style.background = 'rgba(0, 0, 0, 0.5)';
                }, 2000);
            }).catch(err => {
                console.error('Paste failed:', err);
                document.getElementById('_S').innerText = 'PASTE FAILED - Check browser permissions';
            });
        }

        document.getElementById('_2').addEventListener('input', function() {
            if (!_m) {
                this.value = this.value.toUpperCase().replace(/[^UA]/g, '');
            }
            _H(this);
            _P();
        });

        function _P() {
            let i = document.getElementById('_2').value, o = document.getElementById('_3'), s = document.getElementById('_S'), copyBtn = document.getElementById('_btnCopy');
            s.innerText = ''; o.value = ''; copyBtn.style.display = 'none'; copyBtn.style.color = '#fff'; copyBtn.style.background = 'rgba(0, 0, 0, 0.5)'; copyBtn.innerText = 'Copy';
            if (!i.trim()) {
                _H(o);
                return;
            }
            try {
                o.value = _C(i, _p, _m);
                if (o.value.trim()) copyBtn.style.display = 'block';
            } catch (x) {
                let errMsg = '';
                if (!_m) {
                    if (x.message.includes('Invalid cipher signature')) {
                        errMsg = 'INVALID CIPHER - Expected format: UAAA followed by U/A characters';
                    } else if (x.message.includes('TypeError')) {
                        errMsg = 'INVALID INPUT - Cipher must be a valid string';
                    } else {
                        errMsg = 'DECRYPTION ERROR - ' + x.message;
                    }
                } else {
                    errMsg = 'ENCRYPTION ERROR - ' + x.message;
                }
                s.innerText = errMsg;
            }
            _H(o);
        }

        /*
           =========================================================
           PUBLIC API SPECIFICATION FOR INTEGRATIONS & MESSAGING APPS
           =========================================================
        */
        window.TerminalAPI = {
            encrypt: function(text, customKey = _p) {
                try {
                    if (typeof text !== 'string') throw new TypeError('Text must be a string');
                    return _C(text, customKey, true);
                } catch(e) {
                    console.error('TerminalAPI.encrypt error:', e.message);
                    return null;
                }
            },
            decrypt: function(cipher, customKey = _p) {
                try {
                    if (typeof cipher !== 'string') throw new TypeError('Cipher must be a string');
                    return _C(cipher, customKey, false);
                } catch(e) {
                    console.error('TerminalAPI.decrypt error:', e.message);
                    return null;
                }
            },
            generateLink: function(mode, text) {
                if (typeof text !== 'string') return null;
                const base = window.location.href.split('?')[0];
                return `${base}?m=${mode === 'decrypt' ? 'dec' : 'enc'}&d=${encodeURIComponent(text)}`;
            }
        };

    </script>
    <div id="version-badge">0.1.1</div>
</body>
</html>
