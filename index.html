<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encrypted Terminal</title>
    <style>
        body { margin: 0; padding: 0; background: #0a0a0a; color: #cc3d4d; font-family: 'Courier New', monospace; user-select: none; }
        #_A { display: block; max-width: 600px; margin: 40px auto; padding: 20px; }
        textarea { width: 100%; min-height: 120px; height: auto; background: #000; color: #fff; border: 1px solid #333; padding: 10px; font-family: inherit; box-sizing: border-box; margin-bottom: 10px; outline: 0; word-break: break-all; overflow-y: hidden; resize: none; }
        textarea:focus { border-color: #cc3d4d; }
        button { flex: 1; min-width: 150px; padding: 15px; background: #000; color: #cc3d4d; border: 1px solid #cc3d4d; cursor: pointer; font-family: inherit; text-transform: uppercase; font-weight: bold; letter-spacing: 2px; transition: 0.2s; }
        button:hover { background: #cc3d4d; color: #000; }
        button:active { transform: scale(0.98); }
        #_S { color: #ff3333; margin-bottom: 10px; text-align: center; min-height: 20px; font-weight: bold; font-size: 0.9em; word-break: break-word; }
        .slider-container { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
        .toggle-slider { flex: 1; position: relative; height: 50px; background: #000; border: 1px solid #cc3d4d; border-radius: 0; cursor: pointer; overflow: hidden; }
        .toggle-slider-labels { display: flex; width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 2; }
        .toggle-slider-label { flex: 1; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: bold; font-size: 0.9em; letter-spacing: 2px; text-transform: uppercase; pointer-events: none; }
        .toggle-slider-thumb { position: absolute; top: 0; left: 0; width: 50%; height: 100%; background: #cc3d4d; border-radius: 0; transition: 0.3s; cursor: pointer; z-index: 1; }
        .toggle-slider.active .toggle-slider-thumb { left: 50%; }
        .textarea-wrapper { position: relative; display: block; border: 1px solid #333; background: #000; margin-bottom: 10px; }
        .textarea-wrapper:focus-within { border-color: #cc3d4d; }
        .textarea-wrapper textarea { border: none; margin-bottom: 0; }
        .textarea-btn { position: absolute; bottom: 10px; padding: 6px 8px; font-size: 0.85em; background: rgba(0, 0, 0, 0.5); border: none; color: #fff; flex: none; letter-spacing: 0; text-transform: none; font-weight: bold; cursor: pointer; transition: 0.2s; user-select: none; }
        .textarea-btn:hover { color: #000; background: #cc3d4d; }
        #_btnPaste { right: 10px; }
        #_btnCopy { right: 10px; }
    </style>
</head>
<body>
    <div id="_A">
        <div class="slider-container">
            <div class="toggle-slider" id="_slider" onclick="_T()">
                <div class="toggle-slider-labels">
                    <div class="toggle-slider-label">ENCRYPT</div>
                    <div class="toggle-slider-label">DECRYPT</div>
                </div>
                <div class="toggle-slider-thumb"></div>
            </div>
        </div>
        <div id="_S"></div>
        <div class="textarea-wrapper">
            <textarea id="_2" placeholder="Type or paste payload here..." autocomplete="off"></textarea>
            <button id="_btnPaste" class="textarea-btn" onclick="_PST()">Paste</button>
        </div>
        <div id="_textarea-wrapper" class="textarea-wrapper">
            <textarea id="_3" readonly placeholder="Live output will appear here..." autocomplete="off"></textarea>
            <button id="_btnCopy" class="textarea-btn" onclick="_CP()" style="display: none;">Copy</button>
        </div>
    </div>

    <script src="uaaa-core.js"></script>

    <script>
        document.oncontextmenu = e => { e.preventDefault(); return !1; };
        document.onkeydown = e => { if (e.keyCode === 123 || (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74)) || (e.ctrlKey && e.keyCode === 85)) { e.preventDefault(); return !1; } };

        const _p = '\x55\x41\x41\x41';
        let _m = !0;

        window.addEventListener('load', () => {
            document.getElementById('_2').value = '';
            document.getElementById('_3').value = '';

            const u = new URLSearchParams(window.location.search);
            const d = u.get('d'), m = u.get('m'), k = u.get('k') || _p;

            if (d && k === _p) {
                _m = !(m === 'dec');
                const slider = document.getElementById('_slider');
                if (_m) slider.classList.remove('active');
                else slider.classList.add('active');
                document.getElementById('_2').value = decodeURIComponent(d);
                _H(document.getElementById('_2'));
                _P();
            } else {
                _H(document.getElementById('_2'));
                _H(document.getElementById('_3'));
            }
        });

        function _H(el) {
            el.style.height = 'auto';
            el.style.height = el.scrollHeight + 'px';
        }

        function _T() {
            _m = !_m;
            const slider = document.getElementById('_slider');
            if (_m) slider.classList.remove('active');
            else slider.classList.add('active');
            _P();
        }

        function _CP() {
            let output = document.getElementById('_3').value;
            if (!output.trim()) return;
            const btn = document.getElementById('_btnCopy');
            navigator.clipboard.writeText(output).then(() => {
                const originalText = btn.innerText;
                btn.innerText = '✓';
                btn.style.color = '#2ed573';
                setTimeout(() => { btn.innerText = originalText; btn.style.color = '#fff'; }, 2000);
            }).catch(() => document.getElementById('_S').innerText = 'COPY FAILED');
        }

        function _PST() {
            navigator.clipboard.readText().then(text => {
                const input = document.getElementById('_2');
                input.value = text;
                input.dispatchEvent(new Event('input', { bubbles: true }));
                const btn = document.getElementById('_btnPaste');
                const originalText = btn.innerText;
                btn.innerText = '✓';
                btn.style.color = '#2ed573';
                setTimeout(() => { btn.innerText = originalText; btn.style.color = '#fff'; }, 2000);
            }).catch(() => document.getElementById('_S').innerText = 'PASTE FAILED - Check browser permissions');
        }

        document.getElementById('_2').addEventListener('input', function() {
            _H(this);
            _P();
        });

        // The UI processing function must now be async to handle Web Crypto Promises
        async function _P() {
            let i = document.getElementById('_2').value, o = document.getElementById('_3'), s = document.getElementById('_S'), copyBtn = document.getElementById('_btnCopy');
            s.innerText = ''; o.value = ''; copyBtn.style.display = 'none'; copyBtn.style.color = '#fff'; copyBtn.innerText = 'Copy';
            if (!i.trim()) { _H(o); return; }
            
            try {
                o.value = await _C(i, _p, _m);
                if (o.value.trim()) copyBtn.style.display = 'block';
            } catch (x) {
                let errMsg = '';
                if (!_m) {
                    if (x.message.includes('Invalid cipher signature')) {
                        errMsg = 'INVALID CIPHER - Expected format: UAAA followed by Base64 characters';
                    } else if (x.message.includes('Invalid Base64') || x.message.includes('short')) {
                        errMsg = 'INVALID INPUT - Malformed or truncated AES payload';
                    } else if (x.message.includes('Authentication failed')) {
                        errMsg = 'DECRYPTION ERROR - Wrong key or corrupted data';
                    } else {
                        errMsg = 'DECRYPTION ERROR - ' + x.message;
                    }
                } else {
                    errMsg = 'ENCRYPTION ERROR - ' + x.message;
                }
                s.innerText = errMsg;
            }
            _H(o);
        }

        /*
           =========================================================
           PUBLIC API SPECIFICATION FOR INTEGRATIONS & MESSAGING APPS
           =========================================================
        */
        window.TerminalAPI = {
            encrypt: async function(text, customKey = _p) {
                try {
                    return await _C(text, customKey, true);
                } catch(e) {
                    console.error('TerminalAPI.encrypt error:', e.message);
                    return null;
                }
            },
            decrypt: async function(cipher, customKey = _p) {
                try {
                    return await _C(cipher, customKey, false);
                } catch(e) {
                    console.error('TerminalAPI.decrypt error:', e.message);
                    return null;
                }
            },
            generateLink: function(mode, text) {
                if (typeof text !== 'string') return null;
                const base = window.location.href.split('?')[0];
                return `${base}?m=${mode === 'decrypt' ? 'dec' : 'enc'}&d=${encodeURIComponent(text)}`;
            }
        };
    </script>
</body>
</html>
